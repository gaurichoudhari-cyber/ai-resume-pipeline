name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Install Jest Globally (fix CI issue)
        run: npm install -g jest

      - name: Run Tests
        run: jest --ci --runInBand

      - name: Run ESLint
        run: npx eslint . || true
        